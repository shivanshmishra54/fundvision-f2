version: '3.9'

services:
  mysql:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}_root
    ports:
      - "3307:3306"  # Avoid conflict with local MySQL
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql  # Optional schema
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  redis:
    image: redis:alpine
    restart: always
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      retries: 3

  django:
    build: .
    command: gunicorn fundvision.wsgi:application --bind 0.0.0.0:8000 --workers 3 --threads 2 --timeout 120 --max-requests 1000
    restart: always
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health/"]
      interval: 30s
      timeout: 10s
      retries: 5

  celery:
    build: .
    command: celery -A fundvision worker -l info --concurrency=4
    restart: always
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - django
      - redis
    healthcheck:
      test: ["CMD-SHELL", "celery -A fundvision inspect ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  celery-beat:
    build: .
    command: celery -A fundvision beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    restart: always
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - django
      - redis

volumes:
  mysql_data:
  redis_data:
  static_volume:
  media_volume:

networks:
  default:
    driver: bridge
